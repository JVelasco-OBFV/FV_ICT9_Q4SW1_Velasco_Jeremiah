<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Seatwork1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@300..800&family=Indie+Flower&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Questrial&family=Russo+One&display=swap" rel="stylesheet">
    <style>
        body{
            background: url("https://img.freepik.com/free-photo/artistic-blurry-colorful-wallpaper-background_58702-8553.jpg?semt=ais_hybrid&w=740&q=80");
            background-size: cover;
        }
        .container{
            padding: 40px;
            width: 500px;
            height: auto;
            margin-top: 70px;
            background: url("https://e1.pxfuel.com/desktop-wallpaper/581/154/desktop-wallpaper-backgrounds-for-login-page-login-page.jpg");
            background-size: cover;
            color: white;
            font-family: Funnel Display, sans;
            border-radius: 40px;
            text-align: center;
        }
        .container:hover{
            box-shadow: 0 0 4px 5px rgba(255, 255, 255, 0.5);
            transition: box-shadow 0.5s;
        }

    </style>
</head>
<body>
    <div class="container">
        <h1><b>Log-In</b></h1>
        <br>
        <details ontoggle="help()">
        <summary>
            <u>Need Help?</u>
        </summary>
        <br>
        <i id="help"></i>
        </details>
        <br><br>
        <form action="#">
            <label for="name">Username:</label>
            <br>
            <input type="text" class="form-control" id="name" placeholder="Enter Username..." required>
            <br>
            <label for="pass">Password:</label>
            <br>
            <input type="password" class="form-control" id="pass" placeholder="Enter Password..." required>
            <br>
            <label for="address">Email Address:</label>
            <br>
            <input type="email" class="form-control" id="address" placeholder="Enter Email Address...">
            <br><br>
            <input type="checkbox" class="form-check-input" id="case" name="case" value="checked">
            <label for="case" id="checkboxID" class="form-check-label">Stay Logged In</label>
            <br><br>
            <button class="btn" onclick="logging_in()" type="submit" style="background-color: rgb(79, 75, 197);">Log In</button>
            <button class="btn" type="reset" style="background-color: rgb(41, 40, 85);">Reset All</button>
        </form>
    </details>
    </div>

    <script>
        function logging_in() {
        const authenticate = document.getElementById("checkboxID").checked;
        let Username = document.getElementById("name").value;
        let Password = document.getElementById("pass").value;
        const actualUsername = "HelloIam20yrsold";
        const actualPassword = "45397925";

        switch (authenticate) {
            case true:
                break;
        
            case false:
                break;
        }

        if (!Username || !Password) {
            alert('You have not input anything yet');
            return false;
        } 

        if (Username === actualUsername && Password === actualPassword) {
            alert('Welcome Back ' + actualUsername + "!");
        } else {
            alert('Invalid username/password inputted.');
        }

        return false;
        }

        function help() {
            document.getElementById("help").innerHTML = "Fill out to log in to your account.";
        }
    </script>
</body>
</html>
